version: 1
applications:
  - appRoot: ecommerce-frontend
    frontend:
      phases:
        preBuild:
          commands:
            - npm ci --legacy-peer-deps
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: ecommerce-frontend/.next
        files:
          - '**/*'
      cache:
        paths:
          - ecommerce-frontend/node_modules/**/*
          - ecommerce-frontend/.next/cache/**/*
