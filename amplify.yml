version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd ecommerce-frontend && npm ci --legacy-peer-deps
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: ecommerce-frontend/.next
    files:
      - '**/*'
  cache:
    paths:
      - ecommerce-frontend/node_modules/**/*
      - ecommerce-frontend/.next/cache/**/*
